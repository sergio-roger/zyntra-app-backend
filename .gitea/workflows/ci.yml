name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Configure DNS for self-hosted runner
        run: |
          if [ "$GITHUB_SERVER_URL" != "https://github.com" ]; then
            if command -v ip >/dev/null 2>&1; then
              HOST_IP=$(ip route | grep default | awk '{print $3}')
            elif command -v route >/dev/null 2>&1; then
              HOST_IP=$(route -n | awk '/^0\.0\.0\.0/{print $2; exit}')
            fi
            if [ -n "$HOST_IP" ]; then
              echo "$HOST_IP code.zyntra-ts.com" | sudo tee -a /etc/hosts
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test

  build-and-push-docker:
    needs: test-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Configure DNS for self-hosted runner
        run: |
          if [ "$GITHUB_SERVER_URL" != "https://github.com" ]; then
            if command -v ip >/dev/null 2>&1; then
              HOST_IP=$(ip route | grep default | awk '{print $3}')
            elif command -v route >/dev/null 2>&1; then
              HOST_IP=$(route -n | awk '/^0\.0\.0\.0/{print $2; exit}')
            fi
            if [ -n "$HOST_IP" ]; then
              echo "$HOST_IP code.zyntra-ts.com" | sudo tee -a /etc/hosts
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine tags
        id: meta
        run: |
          SHA=${{ steps.vars.outputs.sha_short }}
          BRANCH=${{ github.ref_name }}
          USER=${{ secrets.DOCKER_USERNAME }}
          if [ "$BRANCH" = "main" ]; then
            TAGS="$USER/zyntra-backend:latest,$USER/zyntra-backend:prod-$SHA"
          else
            TAGS="$USER/zyntra-backend:latest,$USER/zyntra-backend:dev-$SHA"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NODE_ENV=production

      - name: Trigger Dokploy Deployment
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
