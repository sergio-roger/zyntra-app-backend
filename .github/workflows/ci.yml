name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run linter
        run: npm run lint
        working-directory: backend

      - name: Run unit tests
        run: npm run test
        working-directory: backend

  build-and-push-docker:
    needs: test-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine tags
        id: meta
        run: |
          SHA=${{ steps.vars.outputs.sha_short }}
          BRANCH=${{ github.ref_name }}
          USER=${{ secrets.DOCKER_USERNAME }}
          if [ "$BRANCH" = "main" ]; then
            TAGS="$USER/zyntra-backend:prod,$USER/zyntra-backend:latest,$USER/zyntra-backend:prod-$SHA"
          elif [ "$BRANCH" = "develop" ]; then
            TAGS="$USER/zyntra-backend:dev,$USER/zyntra-backend:dev-$SHA"
          else
            TAGS="$USER/zyntra-backend:$BRANCH,$USER/zyntra-backend:$BRANCH-$SHA"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NODE_ENV=production

